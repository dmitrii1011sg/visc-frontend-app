<div
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
  [class.border-blue-500]="isDragging()"
  [class.bg-blue-50]="isDragging()"
  class="relative border-2 border-dashed border-gray-300 rounded-xl p-6 transition-all hover:border-blue-400 hover:bg-gray-50 group cursor-pointer"
>
  <input
    type="file"
    accept="image/*"
    (change)="onFileChange($event)"
    class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
  />

  <div class="flex flex-col items-center justify-center gap-2 pointer-events-none">
    <svg
      class="w-8 h-8 text-gray-400 group-hover:text-blue-500 transition-colors"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
      />
    </svg>

    <div class="text-center">
      <p class="text-sm font-medium text-gray-700">Нажмите или перетащите</p>
      <p class="text-xs text-gray-400">PNG, JPG...</p>
    </div>
  </div>
</div>
