<div class="flex flex-col gap-2">
  <div class="flex items-center justify-between mb-2 px-1">
    <h3 class="font-bold text-sm text-gray-500 uppercase tracking-wider select-none">Доли</h3>
    <button
      (click)="toggleAll.emit(!areAllSelected())"
      class="font-bold text-blue-600 hover:text-blue-700 flex items-center gap-1.5 cursor-pointer mr-3"
      [ngClass]="areAllSelected() ? 'text-blue-600' : 'text-slate-400 hover:text-blue-600'"
    >
      <fa-icon [icon]="areAllSelected() ? icons.eye : icons.eyeSlash"></fa-icon>
    </button>
  </div>

  @if (!result) {
    <p class="text-sm text-gray-400">Сгенерируйте изображение, чтобы увидеть слои.</p>
  } @else {
    @for (share of result.shares; track $index) {
      <div
        (click)="toggle.emit($index)"
        class="flex items-center gap-3 p-2.5 border rounded-xl transition select-none shadow-sm"
        [ngClass]="
          isShareSelected($index)
            ? 'bg-blue-50 border-blue-400'
            : 'bg-white border-gray-100 hover:border-gray-200'
        "
      >
        <div
          class="w-10 h-10 bg-gray-100 rounded-lg border border-gray-200 overflow-hidden shrink-0 flex items-center justify-center"
        >
          <canvas
            [id]="'share-canvas-' + $index"
            [width]="result.width"
            [height]="result.height"
            style="image-rendering: pixelated"
          ></canvas>
        </div>

        <div class="flex-1">
          <p class="text-sm font-bold text-slate-700">Доля {{ $index + 1 }}</p>
        </div>

        <button
          class="w-8 h-8 flex items-center cursor-pointer justify-center transition-colors"
          [ngClass]="
            isShareSelected($index) ? 'text-blue-600' : 'text-slate-400 hover:text-blue-600'
          "
        >
          <fa-icon [icon]="isShareSelected($index) ? icons.eye : icons.eyeSlash"></fa-icon>
        </button>
      </div>
    }
  }
</div>
