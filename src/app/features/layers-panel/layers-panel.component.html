<div class="flex flex-col gap-2">
  <h3
    class="hidden md:block font-bold text-sm text-gray-500 uppercase tracking-wider mb-2 select-none"
  >
    Сгенерированные доли
  </h3>

  @if (!result) {
    <p class="text-sm text-gray-400">Сгенерируйте изображение, чтобы увидеть слои.</p>
  } @else {
    @for (share of result.shares; track $index) {
      <div
        (click)="toggle.emit($index)"
        class="flex items-center gap-3 p-3 border rounded-xl cursor-pointer transition select-none shadow-sm"
        [ngClass]="
          isShareSelected($index)
            ? 'bg-blue-50 border-blue-400'
            : 'bg-gray-50 border-gray-200 hover:bg-gray-100'
        "
      >
        <div
          class="w-12 h-12 bg-white rounded border border-gray-300 overflow-hidden shrink-0 flex items-center justify-center"
        >
          <canvas
            [id]="'share-canvas-' + $index"
            [width]="result.width"
            [height]="result.height"
            style="max-width: 100%; max-height: 100%; image-rendering: pixelated"
          ></canvas>
        </div>

        <div class="flex-1">
          <p class="text-sm font-semibold text-gray-700">Доля {{ $index + 1 }}</p>
          <p class="text-[10px] text-gray-400 uppercase tracking-tight">Layer Share</p>
        </div>

        <input
          type="checkbox"
          [checked]="isShareSelected($index)"
          class="w-5 h-5 text-blue-600 rounded-full border-gray-300 focus:ring-blue-500 pointer-events-none mr-2"
        />
      </div>
    }
  }
</div>
